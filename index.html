    <script>
    // Script para cargar imágenes dinámicamente en el grid
            document.addEventListener("DOMContentLoaded", function () {
                const contenedorGrid = document.getElementById('grid-imagenes');
                const totalImagenes = 50; // 10 columnas x 5 filas

                for (let i = 1; i <= totalImagenes; i++) {
                    // Creamos el elemento <img>
                    const img = document.createElement('img');

                    // Asignamos la URL de Picsum con el número actual (i)
                    // Usamos una resolución de 400x400 para que cargue rápido
                    img.src = `https://picsum.photos/400/400?random=${i}`;
                    img.alt = `Imagen de galería ${i}`; 

                    // Insertamos la imagen en el contenedor del grid
                    contenedorGrid.appendChild(img);
                }
            });
    </script>
